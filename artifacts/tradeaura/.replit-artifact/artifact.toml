kind = "web"
previewPath = "/"
title = "TradeAura"
version = "1.0.0"
id = "artifacts/tradeaura"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20079

[services.development]
run = "pnpm --filter @workspace/tradeaura run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tradeaura", "run", "build" ]
publicDir = "artifacts/tradeaura/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20079"
BASE_PATH = "/"
